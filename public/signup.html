<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up | StudyCore</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" type="image/jpeg" href="assets/logo.jpg" />
  </head>
  <body>
    <div class="page-shell">
      <nav class="navbar">
        <div class="container nav-inner">
          <a href="index.html" class="nav-brand"><span>Study</span><span>Core</span></a>
        </div>
      </nav>
      <main class="page-main">
        <section class="section">
          <div class="container" style="max-width: 480px; margin: 60px auto;">
            <div class="info-card">
              <h2>Create your student account</h2>
              <p>Start your 30-day free trial - no payment required.</p>
              <form id="signupForm" class="upload-form" novalidate>
                <div class="form-group">
                  <label for="name">Full name</label>
                  <input id="name" type="text" required autocomplete="name" />
                </div>
                <div class="form-group">
                  <label for="email">Email</label>
                  <input id="email" type="email" required autocomplete="email" />
                </div>
                <div class="form-group">
                  <label for="password">Password</label>
                  <input id="password" type="password" required autocomplete="new-password" minlength="6" />
                  <span style="font-size:0.8rem;opacity:0.7;">At least 6 characters</span>
                </div>
                <div class="form-group">
                  <label for="learningLevel">Learning level</label>
                  <select id="learningLevel">
                    <option value="secondary">Secondary school</option>
                    <option value="tertiary">University / Tertiary</option>
                  </select>
                </div>
                <div id="signupError" style="color:#D64545;display:none;font-size:0.9rem;"></div>
                <button class="btn btn-primary" type="submit" id="signupSubmitBtn">Create account</button>
              </form>
              <p style="margin-top: 12px;">Already have an account? <a href="login.html">Log in</a></p>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script src="js/api.js"></script>
    <script>
      const form = document.getElementById('signupForm');
      const errorBox = document.getElementById('signupError');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorBox.style.display = 'none';
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const learningLevel = document.getElementById('learningLevel').value;
        if (!name || !email || password.length < 6) {
          errorBox.textContent = 'Please fill in every field. Passwords need at least 6 characters.';
          errorBox.style.display = 'block';
          return;
        }
        const btn = document.getElementById('signupSubmitBtn');
        btn.disabled = true;
        btn.textContent = 'Creating account...';
        try {
          await StudyCoreAPI.register({ name, email, password, learningLevel });
          window.location.href = '/dashboard.html';
        } catch (err) {
          errorBox.textContent = err.message;
          errorBox.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Create account';
        }
      });
    </script>
  </body>
</html>
