<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyCore Signup</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="page-shell">
      <main class="page-main">
        <section class="section">
          <div class="container" style="max-width: 480px; margin: 60px auto;">
            <div class="info-card">
              <h2>Create Student Account</h2>
              <form id="signupForm" class="upload-form">
                <input id="name" placeholder="Full name" required />
                <input id="email" type="email" placeholder="Email" required />
                <input id="password" type="password" placeholder="Password" required />
                <button class="btn btn-primary" type="submit">Create account</button>
              </form>
              <p style="margin-top: 12px;"><a href="login.html">Already have an account?</a></p>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script>
      document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const payload = { name: document.getElementById('name').value, email: document.getElementById('email').value, password: document.getElementById('password').value, role: 'STUDENT' };
        const res = await fetch('/api/auth/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        const data = await res.json();
        if (!res.ok) return alert(data.message || 'Signup failed');
        localStorage.setItem('studycore_token', data.token);
        localStorage.setItem('studycore_user', JSON.stringify(data.user));
        window.location.href = '/dashboard.html';
      });
    </script>
  </body>
</html>
