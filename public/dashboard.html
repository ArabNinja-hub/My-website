<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyCore Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="page-shell">
      <nav class="navbar">
        <div class="container nav-inner">
          <a href="/" class="nav-brand"><span>Study</span><span>Core</span></a>
          <div class="nav-actions">
            <button class="btn btn-primary btn-sm" id="logoutBtn">Log Out</button>
          </div>
        </div>
      </nav>
      <main class="page-main">
        <section class="page-hero">
          <div class="container">
            <h1>Student Dashboard</h1>
            <p>Access your learning resources and manage your subscription.</p>
          </div>
        </section>
        <section class="section">
          <div class="container">
            <div id="studentSummary" class="card-grid"></div>
            <div id="contentArea" class="card-grid" style="margin-top: 20px;"></div>
            <div id="subscriptionArea" class="info-card" style="margin-top: 20px;"></div>
          </div>
        </section>
      </main>
    </div>
    <script>
      const token = localStorage.getItem('studycore_token');
      if (!token) window.location.href = '/login.html';
      async function api(url, options = {}) {
        const res = await fetch(url, { ...options, headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}`, ...(options.headers || {}) } });
        return res.json();
      }
      async function loadStudent() {
        const me = await api('/api/auth/me');
        const videos = await api('/api/content/videos');
        const documents = await api('/api/content/documents');
        const quizzes = await api('/api/content/quizzes');
        const assignments = await api('/api/content/assignments');
        const announcements = await api('/api/content/announcements');
        document.getElementById('studentSummary').innerHTML = `
          <div class="info-card"><h3>Welcome</h3><p>${me.user.name}</p></div>
          <div class="info-card"><h3>Subscription</h3><p>${me.user.subscription}</p></div>
          <div class="info-card"><h3>Trial ends</h3><p>${me.user.trialEnd ? new Date(me.user.trialEnd).toLocaleDateString() : 'n/a'}</p></div>
        `;
        document.getElementById('contentArea').innerHTML = `
          <div class="info-card"><h3>Videos</h3>${videos.videos.map(v => `<div class="resource-meta">${v.title} • ${v.subject}</div>`).join('')}</div>
          <div class="info-card"><h3>Documents</h3>${documents.documents.map(d => `<div class="resource-meta">${d.title} • ${d.subject}</div>`).join('')}</div>
          <div class="info-card"><h3>Quizzes</h3>${quizzes.quizzes.map(q => `<div class="resource-meta">${q.title} • ${q.subject}</div>`).join('')}</div>
          <div class="info-card"><h3>Assignments</h3>${assignments.assignments.map(a => `<div class="resource-meta">${a.title} • Due ${a.dueDate || 'Soon'}</div>`).join('')}</div>
          <div class="info-card"><h3>Announcements</h3>${announcements.announcements.map(a => `<div class="resource-meta">${a.title}: ${a.message}</div>`).join('')}</div>
        `;
        document.getElementById('subscriptionArea').innerHTML = `
          <h3>Subscribe</h3>
          <p>Pay K50 for 30 days of access.</p>
          <input id="phone" placeholder="Phone number" />
          <select id="method">
            <option value="MTN MoMo">MTN MoMo</option>
            <option value="Airtel Money">Airtel Money</option>
          </select>
          <button class="btn btn-primary" id="subscribeBtn">Subscribe</button>
        `;
        document.getElementById('subscribeBtn').addEventListener('click', async () => {
          const res = await fetch('/api/subscribe', { method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` }, body: JSON.stringify({ phone: document.getElementById('phone').value, method: document.getElementById('method').value }) });
          const data = await res.json();
          alert(data.message || 'Subscription request sent');
        });
      }
      document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.clear(); window.location.href = '/login.html'; });
      loadStudent();
    </script>
  </body>
</html>
