<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — Join StudyCore</title>
  <meta name="description" content="Create your free StudyCore account and start learning." />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="icon" type="image/jpeg" href="../assets/logo.jpg" />
</head>
<body>

<!-- ════════ NAVBAR ════════ -->
<nav class="navbar">
  <div class="container nav-inner">
    <a href="../index.html" class="nav-brand">
      <img src="../assets/logo.jpg" alt="StudyCore Logo" />
      <span class="nav-brand-text"><span>Study</span><span>Core</span></span>
    </a>
    <ul class="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="courses.html">Courses</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
    <div class="nav-actions">
      <button class="btn btn-outline btn-sm" onclick="window.location.href='login.html'">Log In</button>
    </div>
    <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
  </div>
</nav>

<!-- ════════ SIGNUP FORM ════════ -->
<section class="section" style="background:#fff;min-height:80vh;display:flex;align-items:center;padding:40px 0;">
  <div class="container">
    <div style="max-width:420px;margin:0 auto;background:#fff;padding:40px;border-radius:16px;border:1px solid var(--border);box-shadow:0 10px 30px rgba(0,0,0,0.08);">
      
      <div style="text-align:center;margin-bottom:32px;">
        <img src="../assets/logo.jpg" alt="StudyCore" style="height:52px;border-radius:10px;margin-bottom:16px;"/>
        <h1 style="font-size:1.5rem;margin-bottom:8px;">Create Your Free Account</h1>
        <p style="color:var(--text-muted);">Join StudyCore — Stay Curious & Winning! 🌟</p>
      </div>

      <form id="signupForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" placeholder="e.g. Bwalya Mwale" required style="width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:8px;font-family:var(--font-body);font-size:0.9rem;outline:none;transition:border-color 0.3s;" />
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" placeholder="you@email.com" required style="width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:8px;font-family:var(--font-body);font-size:0.9rem;outline:none;transition:border-color 0.3s;" />
        </div>

        <div class="form-group">
          <label>Level of Study</label>
          <select required style="width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:8px;font-family:var(--font-body);font-size:0.9rem;outline:none;">
            <option value="">Select your level...</option>
            <optgroup label="Secondary School">
              <option>Grade 8</option>
              <option>Grade 9</option>
              <option>Grade 10</option>
              <option>Grade 11</option>
              <option>Grade 12</option>
            </optgroup>
            <optgroup label="Tertiary">
              <option>CBU NQ Year 1</option>
              <option>CBU NQ Year 2</option>
              <option>University Year 1</option>
              <option>University Year 2</option>
              <option>University Year 3+</option>
            </optgroup>
          </select>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="Create a strong password" required style="width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:8px;font-family:var(--font-body);font-size:0.9rem;outline:none;transition:border-color 0.3s;" />
        </div>

        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" placeholder="Confirm your password" required style="width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:8px;font-family:var(--font-body);font-size:0.9rem;outline:none;transition:border-color 0.3s;" />
        </div>

        <label style="display:flex;align-items:flex-start;gap:8px;margin-bottom:20px;cursor:pointer;font-size:0.85rem;">
          <input type="checkbox" required style="margin-top:2px;" />
          <span>I agree to the <a href="#" style="color:var(--teal);text-decoration:none;">Terms of Service</a> and <a href="#" style="color:var(--teal);text-decoration:none;">Privacy Policy</a></span>
        </label>

        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;margin-bottom:16px;">🚀 Create Free Account</button>
      </form>

      <div style="text-align:center;padding-top:20px;border-top:1px solid var(--border);">
        <p style="margin-bottom:16px;">Already have an account? <a href="login.html" style="color:var(--teal);text-decoration:none;font-weight:600;">Log in here</a></p>
      </div>

      <div style="background:#f0fffe;padding:12px;border-radius:8px;border-left:3px solid var(--teal);margin-top:16px;font-size:0.85rem;">
        <strong>🎁 Limited Time:</strong> Get 7 days free Pro access with sign-up!
      </div>

    </div>
  </div>
</section>

<!-- ════════ FOOTER ════════ -->
<footer class="footer">
  <div class="container">
    <div class="footer-bottom">
      <div class="footer-bottom-inner">
        <p>© 2026 StudyCore. All rights reserved.</p>
        <div class="footer-dr">Website by Dr. Relentless ✦ Stay Curious & Winning</div>
      </div>
    </div>
  </div>
</footer>

<script src="../js/main.js"></script>
</body>
</html>
