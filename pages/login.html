<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | StudyCore</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="icon" type="image/jpeg" href="../assets/logo.jpg" />
  </head>
  <body>
    <div class="page-shell">
      <div class="top-bar">🔐 Sign in to access your learning dashboard and saved resources.</div>
      <nav class="navbar">
        <div class="container nav-inner">
          <a href="../index.html" class="nav-brand">
            <img src="../assets/logo.jpg" alt="StudyCore Logo" />
            <span class="nav-brand-text"><span>Study</span><span>Core</span></span>
          </a>
          <ul class="nav-links">
            <li><a href="../index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="courses.html">Courses</a></li>
            <li><a href="documents.html">Documents</a></li>
            <li><a href="videos.html">Videos</a></li>
            <li><a href="announcements.html">Announcements</a></li>
            <li><a href="pricing.html">Pricing</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="contact.html">Contact</a></li>
          </ul>
          <div class="nav-actions">
            <a class="btn btn-outline btn-sm" href="signup.html">Create Account</a>
          </div>
        </div>
      </nav>

      <main class="page-main">
        <section class="page-hero">
          <div class="container">
            <h1>Log In</h1>
            <p>Access your courses, dashboard, and saved learning materials anytime.</p>
            <div class="page-actions">
              <a class="btn btn-primary" href="signup.html">Create an account</a>
              <button class="btn btn-outline" onclick="history.back()">← Back</button>
            </div>
          </div>
        </section>

        <section class="section">
          <div class="container">
            <div class="info-card" style="max-width:480px;margin:0 auto;">
              <form id="loginForm">
                <div class="form-group">
                  <label for="loginEmail">Email</label>
                  <input id="loginEmail" type="email" placeholder="student@example.com" />
                </div>
                <div class="form-group">
                  <label for="loginPassword">Password</label>
                  <input id="loginPassword" type="password" placeholder="Enter your password" />
                </div>
                <div class="form-group" style="display:flex;align-items:center;gap:8px;">
                  <input id="rememberMe" type="checkbox" checked />
                  <label for="rememberMe" style="margin:0;">Remember my login</label>
                </div>
                <button class="btn btn-primary" type="submit">Log In</button>
              </form>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script src="../js/auth.js" defer></script>
    <script src="../js/main.js" defer></script>
  </body>
</html>
