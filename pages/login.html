<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — StudyCore</title>
  <meta name="description" content="Log in to your StudyCore account." />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="icon" type="image/jpeg" href="../assets/logo.jpg" />
</head>
<body>

<!-- ════════ NAVBAR ════════ -->
<nav class="navbar">
  <div class="container nav-inner">
    <a href="../index.html" class="nav-brand">
      <img src="../assets/logo.jpg" alt="StudyCore Logo" />
      <span class="nav-brand-text"><span>Study</span><span>Core</span></span>
    </a>
    <ul class="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="courses.html">Courses</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
    <div class="nav-actions">
      <button class="btn btn-primary btn-sm" onclick="window.location.href='signup.html'">Sign Up</button>
    </div>
    <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
  </div>
</nav>

<!-- ════════ LOGIN FORM ════════ -->
<section class="section" style="background:#fff;min-height:80vh;display:flex;align-items:center;">
  <div class="container">
    <div style="max-width:400px;margin:0 auto;background:#fff;padding:40px;border-radius:16px;border:1px solid var(--border);box-shadow:0 10px 30px rgba(0,0,0,0.08);">
      
      <div style="text-align:center;margin-bottom:32px;">
        <img src="../assets/logo.jpg" alt="StudyCore" style="height:52px;border-radius:10px;margin-bottom:16px;"/>
        <h1 style="font-size:1.5rem;margin-bottom:8px;">Welcome Back</h1>
        <p style="color:var(--text-muted);">Log in to your StudyCore account</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" placeholder="you@email.com" required style="width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:8px;font-family:var(--font-body);font-size:0.9rem;outline:none;transition:border-color 0.3s;" />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="Your password" required style="width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:8px;font-family:var(--font-body);font-size:0.9rem;outline:none;transition:border-color 0.3s;" />
        </div>

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;font-size:0.9rem;">
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
            <input type="checkbox" />
            Remember me
          </label>
          <a href="#" style="color:var(--teal);text-decoration:none;">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;">Log In</button>
      </form>

      <div style="text-align:center;margin-top:24px;padding-top:24px;border-top:1px solid var(--border);">
        <p style="margin-bottom:16px;">No account yet? <a href="signup.html" style="color:var(--teal);text-decoration:none;font-weight:600;">Create one for free</a></p>
      </div>

      <div style="text-align:center;margin-top:20px;padding-top:20px;border-top:1px solid var(--border);">
        <p style="font-size:0.85rem;color:var(--text-muted);">Continue as</p>
        <button type="button" class="btn btn-outline btn-sm" style="width:100%;justify-content:center;margin-top:8px;">Guest User</button>
      </div>

    </div>
  </div>
</section>

<!-- ════════ FOOTER ════════ -->
<footer class="footer">
  <div class="container">
    <div class="footer-bottom">
      <div class="footer-bottom-inner">
        <p>© 2026 StudyCore. All rights reserved.</p>
        <div class="footer-dr">Website by Dr. Relentless ✦ Stay Curious & Winning</div>
      </div>
    </div>
  </div>
</footer>

<script src="../js/main.js"></script>
</body>
</html>
