<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyCore Admin</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="page-shell">
      <nav class="navbar">
        <div class="container nav-inner">
          <a href="/" class="nav-brand"><span>Study</span><span>Core</span></a>
          <div class="nav-actions">
            <button class="btn btn-primary btn-sm" id="logoutBtn">Log Out</button>
          </div>
        </div>
      </nav>
      <main class="page-main">
        <section class="page-hero">
          <div class="container">
            <h1>Admin Dashboard</h1>
            <p>Manage videos, docs, quizzes, assignments, announcements, and users.</p>
          </div>
        </section>
        <section class="section">
          <div class="container">
            <div id="adminSummary" class="card-grid"></div>
            <div class="card-grid" style="margin-top: 20px;">
              <div class="info-card">
                <h3>Upload Video</h3>
                <form id="videoForm" class="upload-form">
                  <input id="videoTitle" placeholder="Title" required />
                  <input id="videoSubject" placeholder="Subject" required />
                  <input id="videoTopic" placeholder="Topic" required />
                  <textarea id="videoDescription" placeholder="Description"></textarea>
                  <input id="videoThumbnail" placeholder="Thumbnail URL" />
                  <button class="btn btn-primary" type="submit">Publish Video</button>
                </form>
              </div>
              <div class="info-card">
                <h3>Upload Document</h3>
                <form id="documentForm" class="upload-form">
                  <input id="documentTitle" placeholder="Title" required />
                  <input id="documentSubject" placeholder="Subject" required />
                  <input id="documentTopic" placeholder="Topic" required />
                  <textarea id="documentDescription" placeholder="Description"></textarea>
                  <input id="documentUrl" placeholder="File URL" />
                  <button class="btn btn-primary" type="submit">Publish Document</button>
                </form>
              </div>
              <div class="info-card">
                <h3>Create Quiz</h3>
                <form id="quizForm" class="upload-form">
                  <input id="quizTitle" placeholder="Title" required />
                  <input id="quizSubject" placeholder="Subject" required />
                  <input id="quizTopic" placeholder="Topic" required />
                  <textarea id="quizDescription" placeholder="Description"></textarea>
                  <textarea id="quizQuestions" placeholder="[{\"question\":\"What is 2+2?\",\"options\":[\"3\",\"4\",\"5\"],\"answer\":1}]" required></textarea>
                  <button class="btn btn-primary" type="submit">Publish Quiz</button>
                </form>
              </div>
              <div class="info-card">
                <h3>Create Assignment</h3>
                <form id="assignmentForm" class="upload-form">
                  <input id="assignmentTitle" placeholder="Title" required />
                  <input id="assignmentSubject" placeholder="Subject" required />
                  <input id="assignmentTopic" placeholder="Topic" required />
                  <textarea id="assignmentDescription" placeholder="Description"></textarea>
                  <input id="assignmentDueDate" type="date" />
                  <button class="btn btn-primary" type="submit">Publish Assignment</button>
                </form>
              </div>
              <div class="info-card">
                <h3>Post Announcement</h3>
                <form id="announcementForm" class="upload-form">
                  <input id="announcementTitle" placeholder="Title" required />
                  <textarea id="announcementMessage" placeholder="Message" required></textarea>
                  <button class="btn btn-primary" type="submit">Publish</button>
                </form>
              </div>
            </div>
            <div id="usersList" class="info-card" style="margin-top: 20px;"></div>
          </div>
        </section>
      </main>
    </div>
    <script src="js/main.js"></script>
    <script>
      const token = localStorage.getItem('studycore_token');
      if (!token) window.location.href = '/login.html';
      async function fetchJson(url, options = {}) {
        const res = await fetch(url, { ...options, headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}`, ...(options.headers || {}) } });
        return res.json();
      }
      async function loadAdmin() {
        const summary = await fetchJson('/api/admin/analytics');
        document.getElementById('adminSummary').innerHTML = `
          <div class="info-card"><h3>Total users</h3><p>${summary.totalUsers}</p></div>
          <div class="info-card"><h3>Active users</h3><p>${summary.activeUsers}</p></div>
          <div class="info-card"><h3>Revenue</h3><p>K${summary.revenue}</p></div>
        `;
        const users = await fetchJson('/api/admin/users');
        document.getElementById('usersList').innerHTML = '<h3>Students</h3>' + users.users.filter(u => u.role === 'STUDENT').map(u => `<div class="resource-meta">${u.name} • ${u.email} • ${u.subscription} • trial: ${u.trialEnd ? new Date(u.trialEnd).toLocaleDateString() : 'n/a'}</div>`).join('');
      }
      document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.clear(); window.location.href = '/login.html'; });
      document.getElementById('videoForm').addEventListener('submit', async (e) => { e.preventDefault(); const payload = { title: document.getElementById('videoTitle').value, subject: document.getElementById('videoSubject').value, topic: document.getElementById('videoTopic').value, description: document.getElementById('videoDescription').value, thumbnail: document.getElementById('videoThumbnail').value }; await fetchJson('/api/admin/videos', { method: 'POST', body: JSON.stringify(payload) }); alert('Video published'); });
      document.getElementById('documentForm').addEventListener('submit', async (e) => { e.preventDefault(); const payload = { title: document.getElementById('documentTitle').value, subject: document.getElementById('documentSubject').value, topic: document.getElementById('documentTopic').value, description: document.getElementById('documentDescription').value, url: document.getElementById('documentUrl').value }; await fetchJson('/api/admin/documents', { method: 'POST', body: JSON.stringify(payload) }); alert('Document published'); });
      document.getElementById('quizForm').addEventListener('submit', async (e) => { e.preventDefault(); const payload = { title: document.getElementById('quizTitle').value, subject: document.getElementById('quizSubject').value, topic: document.getElementById('quizTopic').value, description: document.getElementById('quizDescription').value, questions: JSON.parse(document.getElementById('quizQuestions').value) }; await fetchJson('/api/admin/quizzes', { method: 'POST', body: JSON.stringify(payload) }); alert('Quiz published'); });
      document.getElementById('assignmentForm').addEventListener('submit', async (e) => { e.preventDefault(); const payload = { title: document.getElementById('assignmentTitle').value, subject: document.getElementById('assignmentSubject').value, topic: document.getElementById('assignmentTopic').value, description: document.getElementById('assignmentDescription').value, dueDate: document.getElementById('assignmentDueDate').value }; await fetchJson('/api/admin/assignments', { method: 'POST', body: JSON.stringify(payload) }); alert('Assignment published'); });
      document.getElementById('announcementForm').addEventListener('submit', async (e) => { e.preventDefault(); const payload = { title: document.getElementById('announcementTitle').value, message: document.getElementById('announcementMessage').value }; await fetchJson('/api/admin/announcements', { method: 'POST', body: JSON.stringify(payload) }); alert('Announcement posted'); });
      loadAdmin();
    </script>
  </body>
</html>
