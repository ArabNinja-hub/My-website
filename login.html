<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyCore Login</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="page-shell">
      <main class="page-main">
        <section class="section">
          <div class="container" style="max-width: 480px; margin: 60px auto;">
            <div class="info-card">
              <h2>Welcome to StudyCore</h2>
              <p>Login to continue to your dashboard.</p>
              <form id="loginForm" class="upload-form">
                <input id="email" type="email" placeholder="Email" required />
                <input id="password" type="password" placeholder="Password" required />
                <button class="btn btn-primary" type="submit">Login</button>
              </form>
              <p style="margin-top: 12px;"><a href="signup.html">Create student account</a></p>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script>
      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const payload = { email: document.getElementById('email').value, password: document.getElementById('password').value };
        const res = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        const data = await res.json();
        if (!res.ok) return alert(data.message || 'Login failed');
        localStorage.setItem('studycore_token', data.token);
        localStorage.setItem('studycore_user', JSON.stringify(data.user));
        if (data.user.role === 'ADMIN') window.location.href = '/admin.html';
        else window.location.href = '/dashboard.html';
      });
    </script>
  </body>
</html>
